name: Update Finance News Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: finance-news-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare OPML (optional)
        env:
          FINANCE_OPML_B64: ${{ secrets.FINANCE_OPML_B64 }}
        run: |
          mkdir -p feeds
          if [ -n "$FINANCE_OPML_B64" ]; then
            echo "$FINANCE_OPML_B64" | base64 --decode > feeds/finance.opml
            echo "Loaded feeds/finance.opml from FINANCE_OPML_B64 secret"
          else
            echo "No FINANCE_OPML_B64 secret; using repo feeds/finance.opml if present"
          fi

      - name: Update data
        run: |
          if [ -f feeds/finance.opml ]; then
            python scripts/update_finance.py --output-dir data --window-hours 24 --rss-opml feeds/finance.opml
          else
            python scripts/update_finance.py --output-dir data --window-hours 24
          fi

      - name: Fetch sentiment indicators
        continue-on-error: true
        run: python scripts/fetch_sentiment.py --output-dir data

      - name: Fetch economic calendar
        continue-on-error: true
        run: python scripts/fetch_calendar.py --output-dir data

      - name: Generate market summary
        continue-on-error: true
        run: python scripts/generate_summary.py --data-dir data --output-dir data --no-llm

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: update finance news snapshot"
          for i in 1 2 3; do
            git push && break
            echo "Push failed (attempt $i), rebasing..."
            git pull --rebase origin main
          done

      - name: Send notifications
        if: success()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFY_TOP_N: "30"
        run: |
          if [ -n "$FEISHU_WEBHOOK" ] || [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            python scripts/notify.py --data-dir data
          else
            echo "No notification secrets configured, skipping"
          fi
