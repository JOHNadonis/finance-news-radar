<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Signal Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div class="hero-headline">
          <div class="hero-icon">F</div>
          <div>
            <p class="hero-tag">FINANCE INTELLIGENCE</p>
            <h1>24 小时金融信息雷达</h1>
          </div>
        </div>
        <p class="hero-sub">
          聚合全球金融快讯、深度文章、加密货币动态，自动采集 &amp; 过滤，每 15 分钟更新。
        </p>
        <section class="stats" id="stats"></section>
        <section class="sentiment-panel" id="sentimentPanel"></section>
      </header>

      <section class="summary-section" id="summarySection"></section>

      <section class="market-tabs" id="marketTabs">
        <button class="market-btn active" data-market="" type="button">全部</button>
        <button class="market-btn" data-market="a_stock" type="button">A股</button>
        <button class="market-btn" data-market="us_stock" type="button">美股</button>
        <button class="market-btn" data-market="hk_stock" type="button">港股</button>
        <button class="market-btn" data-market="macro" type="button">宏观</button>
        <button class="market-btn" data-market="crypto" type="button">加密</button>
        <button class="market-btn" data-market="commodity" type="button">大宗</button>
        <button class="market-btn" data-market="forex" type="button">外汇</button>
      </section>

      <section class="calendar-section" id="calendarSection"></section>

      <section class="controls">
        <input id="searchInput" type="search" placeholder="搜索标题 / 来源" />
        <select id="siteSelect">
          <option value="">全部站点</option>
        </select>
        <div class="mode-switch">
          <button id="modeFinBtn" class="mode-btn active" type="button">金融过滤</button>
          <button id="modeAllBtn" class="mode-btn" type="button">全量</button>
        </div>
        <label id="allDedupeWrap" class="all-dedupe" for="allDedupeToggle">
          <input id="allDedupeToggle" type="checkbox" checked />
          <span class="all-dedupe-dot"></span>
          <span id="allDedupeLabel">去重开</span>
        </label>
        <span class="updated" id="updatedAt">加载中...</span>
      </section>
      <div class="mode-hint" id="modeHint">当前视图：金融过滤</div>

      <section class="site-pills" id="sitePills"></section>

      <section class="list-wrap">
        <div class="list-head">
          <h2>最近 24 小时更新</h2>
          <span id="resultCount">0 条</span>
        </div>
        <div id="newsList" class="news-list"></div>
      </section>

      <footer style="margin-top: 24px; padding: 16px; text-align: center; color: var(--muted); font-size: 12px; border-top: 1px solid var(--line);">
        Finance News Radar — 数据每 15 分钟自动更新 · <a href="https://github.com" style="color: var(--accent-2); text-decoration: none;">GitHub</a>
      </footer>
    </main>

    <template id="itemTpl">
      <article class="news-card">
        <div class="meta-row">
          <span class="site"></span>
          <span class="source"></span>
          <span class="market-tag-list"></span>
          <time class="time"></time>
        </div>
        <a class="title" target="_blank" rel="noopener noreferrer"></a>
      </article>
    </template>

    <script src="./assets/app.js" defer></script>
  </body>
</html>
